flow.title=PRONAĐITE SEBE UZ VEČNI TOK DRINE
flow.desc=Na obalama Drine, luksuz dobija drugačije značenje. Intimnije, prizemnije, stvarnije. To je mesto za usporavanje, ponovno povezivanje sa prirodom i otkrivanje lepote jednostavnosti, udobnosti i pripadanja.
flow.cta=Istraži Drinu
flow.comingSoon=Rezervacioni sistem dolazi uskoro...
luxury.title=KO SMO MI?
luxury.desc=U Espadrini, priroda i udobnost spajaju se u utočište dizajnirano za dubok odmor.\n\nSmešteno uz reku Drinu, naše imanje nudi prostrane apartmane, spa iskustva i restoran inspirisan pejzažom.\n\nSavršen beg od buke, bez odricanja od zadovoljstava vrhunske hrane i pažljivog dizajna.
luxury.cta=O apartmanu
food.title=DIVLJA ELEGANCIJA
food.desc=U Espadrini, gastronomija prati ritam prirode.
food.desc2=Inspirisani rekom Drinom, njenim sezonskim promenama i bogatstvom lokalnog pejzaža, kreiramo meni koji spaja savremeni kulinarski pristup i autentične regionalne ukuse.
food.desc3=Kroz pažljivo odabrane namirnice i blisku saradnju sa lokalnim proizvođačima, svako jelo postaje deo iskustva koje je sveže, promišljeno i duboko povezano sa svojim okruženjem.
food.cta=Saznaj više
food.comingSoon=Uskoro će sve biti implementirano
spa.title=TIHA OBNOVA
spa.desc=U Espadrini, wellness je osmišljen kao povratak balansu.
spa.desc2=Od toplote saune i udobnosti đakuzija do duboko obnavljajućeg iskustva našeg magnezijumskog bazena, svaki element je stvoren da umiri telo, razbistri um i pozove na sporiji ritam.
spa.desc3=Ovde opuštanje postaje više od trenutka bega, postaje deo načina na koji se ponovo povezujete sa sobom.
spa.cta=Uđite u spa
wellness.hero.title=WELLNESS I SPA
wellness.hero.subtitle=Rituali Tišine
wellness.hero.scroll=skrolujte za više
wellness.spa.title=GDE SE TOPLOTA, VODA\nI TIŠINA SUSREĆU
wellness.spa.desc=Espadrina wellness je dizajniran kao lagani povratak u balans - kroz toplotu, paru, mineralnu vodu i tihi kontrast leda. Privatno utočište posvećeno odmoru.
wellness.spa.cta=Saznaj više
wellness.treatments.title=DVE SAUNE,\nJEDNA TIHA VATRA
wellness.treatments.desc=Suva toplota, toplo drvo i dubok osećaj privatnosti. Ritual saune je dizajniran za opuštanje - mesto gde dan napušta telo.
wellness.treatments.cta=Pogledaj ponudu
wellness.pool.title=BAZEN STVOREN\nZA DUBOK ODMOR
wellness.pool.desc=Voda bogata magnezijumom, lagani pokreti i umirujuća vodena kaskada stvaraju trenutak koji deluje osvežavajuće i duboko uzemljujuće.
wellness.pool.cta=Istraži ritual
wellness.iceRoom.title=LEDENA SOBA
wellness.iceRoom.desc=Hladna soba donosi kontrast nakon toplote. Okruženo ledom, telo se polako budi, cirkulacija se osvežava, a ritual dobija svoju čistu, energizujuću završnicu.
inspiration.title=BESKRAJNA INSPIRACIJA
inspiration.desc=Dozvolite da vas lepota Drine inspiriše. Naš resort je utočište za one koji traže autentičnost, mir i nezaboravne trenutke uz šum vode.
inspiration.cta=KONTAKTIRAJTE NAS
footer.rights=2026 Espadrina. Sva prava zadržana.

