restaurant.chef.desc=Ja sam Dragana Zajić, kreativac koji veruje da svako jelo treba da nosi emociju, karakter i prepoznatljiv pečat. Inspiraciju pronalazim u eksperimentisanju sa ukusima, modernom pristupu kuhinji i stvaranju iskustva koje se pamti dugo nakon poslednjeg zalogaja.
