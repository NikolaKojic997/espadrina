restaurant.chef.name=CHEF GAGA
restaurant.chef.desc=At Espadrina, water is part of every moment of the stay.\n\nFrom private terrace pools and the main outdoor pool to the spa experience and the riverside beach, the entire setting is designed to keep you connected to freshness, calm, and the rhythm of nature.\n\nDrina remains at the heart of the landscape — present in the view, the atmosphere, and the feeling of being fully removed from the everyday.
