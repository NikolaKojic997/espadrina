flow.title=FIND YOURSELF ALONG THE TIMELESS FLOW OF THE DRINA
flow.desc=On the banks of the Drina, luxury takes on a different meaning. More intimate, more grounded, more real. It is a place to slow down, reconnect with nature, and rediscover the beauty of simplicity, comfort and belonging.
flow.cta=Explore Drina
flow.comingSoon=Booking system is coming soon...
luxury.title=WHO ARE WE?
luxury.desc=At Espadrina, nature and comfort unite in a retreat designed for deep rest.\n\nSet by the Drina River, our estate offers spacious apartments, wellness experiences, and a landscape-inspired restaurant.\n\nA perfect escape from the noise, without sacrificing the pleasures of fine food and thoughtful design.
luxury.cta=About apartment
food.title=WILD ELEGANCE
food.desc=At Espadrina, gastronomy follows the rhythm of nature.
food.desc2=Inspired by the Drina River, its seasonal shifts, and the richness of the local landscape, we create a menu that brings together a contemporary culinary approach and authentic regional flavors.
food.desc3=Through carefully selected ingredients and close collaboration with local producers, every dish becomes part of an experience that feels fresh, thoughtful and deeply connected to its setting.
food.cta=Find out more
food.comingSoon=Everything will be implemented soon
wellness.treatments.title=TWO SAUNAS,\nONE QUIET FIRE
wellness.treatments.desc=Discover the power of the Finnish and bio saunas, which provide a sanctuary for relaxing the mind and body.\n\nThe Finnish sauna, with its dry heat, stimulates detoxification, relieves pain in muscles and joints, and improves cardiovascular health through deep sweating.\n\nOn the other hand, the moist heat of the bio sauna opens the airways, improves skin health, and stimulates circulation.
wellness.treatments.cta=Explore treatments
spa.title=QUIET RENEWAL
spa.desc=At Espadrina, wellness is designed as a return to balance.
spa.desc2=From the warmth of the sauna and the comfort of the jacuzzi to the deeply restorative experience of our magnesium pool, every element is created to calm the body, clear the mind, and invite a slower rhythm.
spa.desc3=Here, relaxation becomes more than a moment of escape, it becomes part of the way you reconnect with yourself.
spa.cta=Enter the spa
wellness.openPool.title=OPEN POOL
wellness.openPool.desc=Indulge in relaxation in our open saltwater pool at a temperature of 28°C, offering a unique experience of bliss and comfort.\n\nThe spacious terrace around the pool offers a view of untouched nature and the Drina River.
wellness.indoorPool.title=A POOL MADE\nFOR DEEP REST
wellness.indoorPool.desc=Magnesium-rich water, soft movement and a calming water cascade create a moment that feels both cleansing and deeply grounding.
wellness.indoorPool.notice=Indoor magnesium-enriched pool is currently under preparation.
wellness.tepidarium.title=STEAM BATH
wellness.tepidarium.desc=The steam bath is especially valued for its therapeutic properties, helping to alleviate respiratory problems and improve skin elasticity. Indulge in the benefits of warm steam, after which you will feel refreshed and reborn.
inspiration.title=ENDLESS INSPIRATION
inspiration.desc=Let the beauty of the Drina inspire you. Our resort is a sanctuary for those seeking authenticity, peace, and unforgettable moments by the sound of the water.
inspiration.cta=CONTACT US
footer.rights=2026 Espadrina. All Rights Reserved.

