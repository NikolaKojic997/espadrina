<header class="header" [class.dark-header]="isApartmentsPage()" [class.apartments-header]="isApartmentsPage()" [class.solid-header]="isGalleryPage()">
  <div class="logo">
    <a routerLink="/"><img src="/svg/logo-simbol.svg" alt="Espadrina Logo"></a>
  </div>
  <div class="nav-right">
    @if (!isBookingPage()) {
    <a routerLink="/booking" class="ghost-btn">{{ langService.current().nav.bookNow }}</a>
    }
    <button class="menu-toggle" (click)="toggleMenu()">
      <img src="/svg/Menu.svg" alt="Menu">
    </button>
  </div>
</header>


<main>
  <router-outlet></router-outlet>

  <footer class="site-footer">
    @if (!isBookingPage()) {
    <div class="footer-brand">
      <img src="/svg/tipografija-espadrina.svg" alt="Espadrina" class="brand-logo">
    </div>
    }
    <div class="footer-bottom">
      <div class="social-icons">
        <a href="https://www.instagram.com/espadrina/" target="_blank" rel="noopener noreferrer" class="icon-box" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="mailto:recepcija@espadrina.com" class="icon-box" aria-label="Email"><i class="fas fa-envelope"></i></a>
      </div>
      <div class="copyright">
        {{ langService.current().footer.rights }}
      </div>
    </div>
  </footer>
</main>

<div class="side-menu-overlay" [class.open]="isMenuOpen()" (click)="toggleMenu()">
  <div class="side-menu-content" (click)="$event.stopPropagation()">
    <div class="menu-header">
      <button class="menu-close-btn" (click)="toggleMenu()">
        <!-- Simple SVG arrow pointing right to "push" the menu back -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
      <span class="menu-title">{{ langService.current().nav.menu }}</span>
    </div>
    <nav class="side-nav">
      @for (item of navItems(); track item.label) {
      <div class="side-nav-item-wrapper">
        <div class="side-nav-divider"></div>
        <a [routerLink]="item.link" class="side-nav-item" (click)="toggleMenu()">
          {{ item.label }}
        </a>
      </div>
      }
    </nav>
  </div>
</div>

@if (!isBookingPage()) {
<div class="fixed-lang-switch">
  <button [class.active]="langService.currentLang() === 'en'" (click)="langService.setLanguage('en')">EN</button>
  <span class="divider">|</span>
  <button [class.active]="langService.currentLang() === 'sr'" (click)="langService.setLanguage('sr')">SRB</button>
</div>
}
