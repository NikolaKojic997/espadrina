<div class="booking-flow-container">
  <!-- 1. Header (15%) -->
  <nav class="booking-header">
    <div class="header-logo">
      <a routerLink="/" class="logo-text">{{ langService.current().company.name }}</a>
    </div>
    
    <div class="booking-stages">
      <!-- Stages removed as WebBookingPro handles the flow -->
    </div>

    <div class="header-right">
    </div>
  </nav>

  <!-- 2 & 3. Main Content (Ocean 40% + Pattern 40% = 80%) -->
  <div class="booking-content-wrapper">
    
    <div class="widget-container">
      <div id="wbproot" class="notranslate"></div>
    </div>

  </div>

  <!-- 4. Sub-footer (5%) -->
  <footer class="booking-sub-footer">
    <div class="sub-footer-item">2026 {{ langService.current().company.name }}</div>
    <div class="sub-footer-group">
      <a href="#" class="sub-footer-item">{{ langService.current().booking?.footer?.cancel }}</a>
      <div class="sub-footer-divider"></div>
      <a href="#" class="sub-footer-item">{{ langService.current().booking?.footer?.privacy }}</a>
    </div>
  </footer>
</div>
